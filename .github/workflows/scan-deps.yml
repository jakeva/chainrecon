name: Scan Dependencies

on:
  workflow_call:
    inputs:
      threshold:
        description: "Fail if any dependency's target score meets or exceeds this value"
        required: false
        type: number
        default: 50
      chainrecon-version:
        description: "chainrecon version to install (e.g. v0.2.0 or latest)"
        required: false
        type: string
        default: latest
    secrets:
      github-token:
        description: "GitHub token for API rate limits"
        required: false

jobs:
  scan:
    name: Scan changed dependencies
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.26"

      - name: Install chainrecon
        run: go install github.com/chainrecon/chainrecon/cmd/chainrecon@${{ inputs.chainrecon-version }}

      - name: Detect changed packages
        id: detect
        run: |
          # Compare package.json between base and head to find changed deps.
          git fetch origin ${{ github.base_ref }} --depth=1

          CHANGED=$(git diff origin/${{ github.base_ref }}...HEAD -- '**/package.json' '**/package-lock.json' '**/yarn.lock' '**/pnpm-lock.yaml' | \
            grep -E '^\+\s+"[^"]+":' | \
            sed 's/.*"\([^"]*\)".*/\1/' | \
            grep -v '^\^' | \
            sort -u || true)

          if [ -z "$CHANGED" ]; then
            echo "packages=" >> "$GITHUB_OUTPUT"
            echo "No dependency changes detected."
          else
            echo "packages<<EOF" >> "$GITHUB_OUTPUT"
            echo "$CHANGED" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "Changed packages:"
            echo "$CHANGED"
          fi

      - name: Scan dependencies
        if: steps.detect.outputs.packages != ''
        env:
          GITHUB_TOKEN: ${{ secrets.github-token || github.token }}
        run: |
          EXIT_CODE=0
          mkdir -p sarif-results

          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            echo "Scanning $pkg ..."
            chainrecon scan "$pkg" \
              --format sarif \
              --threshold ${{ inputs.threshold }} \
              --depth 10 \
              > "sarif-results/${pkg//\//_}.sarif" 2>/dev/null || EXIT_CODE=1
          done <<< "${{ steps.detect.outputs.packages }}"

          # Merge SARIF files if any exist.
          if ls sarif-results/*.sarif 1>/dev/null 2>&1; then
            echo "SARIF files generated."
          fi

          exit $EXIT_CODE

      - name: Upload SARIF
        if: always() && steps.detect.outputs.packages != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif-results/

name: Smoke Test

on:
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    name: Scan packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - axios
          - express
          - "@anthropic-ai/sdk"
          - lodash
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Build
        run: go build -o chainrecon ./cmd/chainrecon

      - name: Scan ${{ matrix.package }}
        run: ./chainrecon scan "${{ matrix.package }}" --timeout 90s

      - name: Scan ${{ matrix.package }} (JSON)
        run: ./chainrecon scan "${{ matrix.package }}" --format json --timeout 90s | jq .scores

name: Smoke Test

on:
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    name: Scan packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - axios
          - express
          - "@anthropic-ai/sdk"
          - lodash
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.26"

      - name: Build
        run: go build -o chainrecon ./cmd/chainrecon

      - name: Scan ${{ matrix.package }}
        run: ./chainrecon scan "${{ matrix.package }}" --timeout 90s

      - name: Scan ${{ matrix.package }} (JSON)
        run: ./chainrecon scan "${{ matrix.package }}" --format json --timeout 90s | jq .scores

# Example: scan dependencies when package.json changes in a PR.
# Copy this file to .github/workflows/ in your repository.

name: Scan Dependencies
on:
  pull_request:
    paths:
      - "**/package.json"
      - "**/package-lock.json"
      - "**/yarn.lock"
      - "**/pnpm-lock.yaml"

jobs:
  scan:
    uses: jakeva/chainrecon/.github/workflows/scan-deps.yml@main
    with:
      threshold: 50
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
